  </g>

  <!-- Panel border -->
  <rect x="590" y="50" width="565" height="530" rx="12" fill="none" stroke="#1e3050" stroke-width="1"/>

  <!-- Bottom right tagline -->
  <text x="1140" y="608" text-anchor="end" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="13" fill="#1e3550" font-weight="500">Free to start · No install required</text>
</svg>
