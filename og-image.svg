    <line x1="590" y1="92" x2="1155" y2="92" stroke="#1a2740" stroke-width="1"/>
    <!-- Traffic lights -->
    <circle cx="618" cy="71" r="5.5" fill="#ef4444" fill-opacity="0.9"/>
    <circle cx="636" cy="71" r="5.5" fill="#f59e0b" fill-opacity="0.9"/>
    <circle cx="654" cy="71" r="5.5" fill="#22c55e" fill-opacity="0.9"/>
    <!-- URL bar pill -->
