    <line x1="590" y1="364" x2="1155" y2="364" stroke="#111e30" stroke-width="1"/>
    <text x="606" y="333" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="12.5" fill="#dde6f2">Canon AE-1 35mm Film Camera</text>
    <text x="606" y="351" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="10.5" fill="#2d4a66">Buy It Now · Good Condition</text>
    <text x="836" y="343" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="11.5" fill="#486280">Film Cameras</text>
    <text x="966" y="343" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#e2ecf8">$120.00</text>
    <rect x="1054" y="331" width="62" height="20" rx="10" fill="#0c2218"/>
    <text x="1085" y="345" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="10.5" font-weight="700" fill="#4ade80">Listed</text>

    <!-- Row 5 -->
    <rect x="590" y="364" width="565" height="50" fill="#091220"/>
    <line x1="590" y1="414" x2="1155" y2="414" stroke="#111e30" stroke-width="1"/>
    <text x="606" y="383" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="12.5" fill="#dde6f2">PSA 10 Charizard Holo 1st Edition</text>
    <text x="606" y="401" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="10.5" fill="#2d4a66">Buy It Now · Graded</text>
    <text x="836" y="393" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="11.5" fill="#486280">Trading Cards</text>
    <text x="966" y="393" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#e2ecf8">$850.00</text>
    <rect x="1054" y="381" width="62" height="20" rx="10" fill="#0c2218"/>
    <text x="1085" y="395" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="10.5" font-weight="700" fill="#4ade80">Listed</text>

    <!-- Row 6 (fading) -->
