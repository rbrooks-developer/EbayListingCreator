    <text x="606" y="483" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="12.5" fill="#dde6f2" opacity="0.2">Vintage Polaroid OneStep Camera</text>
    <text x="836" y="493" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="11.5" fill="#486280" opacity="0.2">Film Cameras</text>
    <text x="966" y="493" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#e2ecf8" opacity="0.2">$65.00</text>

    <!-- Fade overlay at bottom of panel -->
