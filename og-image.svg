    <text x="606" y="301" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="10.5" fill="#2d4a66">Buy It Now · Like New</text>
    <text x="836" y="293" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="11.5" fill="#486280">Video Games</text>
