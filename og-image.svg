    <line x1="590" y1="464" x2="1155" y2="464" stroke="#111e30" stroke-width="1"/>
    <text x="606" y="433" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="12.5" fill="#dde6f2" opacity="0.55">Levi's 501 Jeans 32x32 Dark Wash</text>
    <text x="836" y="443" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="11.5" fill="#486280" opacity="0.55">Men's Jeans</text>
    <text x="966" y="443" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#e2ecf8" opacity="0.55">$38.00</text>

