<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#060d1a"/>
      <stop offset="100%" stop-color="#0b1a2e"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="300" cy="315" r="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panelBg" x1="590" y1="50" x2="590" y2="580" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0c1525"/>
    </linearGradient>
    <linearGradient id="panelFade" x1="590" y1="420" x2="590" y2="580" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1525" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0c1525" stop-opacity="1"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#ffffff" fill-opacity="0.035"/>
    </pattern>
    <filter id="panelShadow" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <clipPath id="panelClip">
      <rect x="590" y="50" width="565" height="530" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowBlue)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ── LEFT SIDE ─────────────────────────────────────────────────────── -->

  <!-- Eyebrow badge -->
  <rect x="60" y="174" width="188" height="28" rx="14" fill="#1e3a6e" fill-opacity="0.5"/>
  <rect x="60" y="174" width="188" height="28" rx="14" fill="none" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="1"/>
  <text x="154" y="193" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#60a5fa">SELLER TOOLS</text>

  <!-- Main headline -->
  <text x="60" y="280" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="60" font-weight="800" fill="#f1f5f9" letter-spacing="-2">Create My</text>
  <text x="60" y="350" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="60" font-weight="800" fill="#3b82f6" letter-spacing="-2">Listings</text>

  <!-- Underline accent -->
  <rect x="60" y="358" width="216" height="3" rx="1.5" fill="#2563eb" fill-opacity="0.45"/>

  <!-- Subtitle -->
  <text x="60" y="402" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="18" fill="#94a3b8">Post listings in bulk — import from</text>
  <text x="60" y="428" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="18" fill="#94a3b8">Excel, manage photos, publish directly.</text>

  <!-- Feature: Bulk import -->
  <rect x="60" y="455" width="18" height="18" rx="9" fill="#166534" fill-opacity="0.4"/>
  <text x="69" y="467.5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4ade80">&#10003;</text>
  <text x="86" y="468" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="15" fill="#cbd5e1">Bulk import from Excel &amp; CSV</text>

  <!-- Feature: Photos -->
  <rect x="60" y="486" width="18" height="18" rx="9" fill="#166534" fill-opacity="0.4"/>
  <text x="69" y="498.5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4ade80">&#10003;</text>
  <text x="86" y="499" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="15" fill="#cbd5e1">Upload &amp; manage listing photos</text>

  <!-- Feature: Trading cards -->
  <rect x="60" y="517" width="18" height="18" rx="9" fill="#166534" fill-opacity="0.4"/>
  <text x="69" y="529.5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4ade80">&#10003;</text>
  <text x="86" y="530" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="15" fill="#cbd5e1">Trading card grading support</text>

  <!-- Domain watermark -->
  <text x="60" y="600" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="13" fill="#2d4a6e" font-weight="500">createmylistings.com</text>

