    <text x="966" y="243" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#e2ecf8">$89.99</text>
    <rect x="1054" y="231" width="62" height="20" rx="10" fill="#0c2218"/>
    <text x="1085" y="245" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="10.5" font-weight="700" fill="#4ade80">Listed</text>

