<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark navy background -->
  <rect width="100" height="100" rx="14" fill="#0d1b2e"/>

  <!-- "CM" in white (Create My) -->
  <text
    x="10" y="50"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="40"
    fill="#ffffff"
  >CM</text>

  <!-- "L" in blue (Listings) -->
  <text
    x="10" y="86"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="40"
    fill="#3b6ef5"
  >L</text>

  <!-- Blue underline under L, matching the logo's accent -->
  <rect x="10" y="90" width="33" height="5" rx="2.5" fill="#3b6ef5"/>
</svg>
