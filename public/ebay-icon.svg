  <!-- "CML" all white -->
  <text
    x="10" y="50"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="40"
    fill="#ffffff"
  >CM</text>

  <text
    x="10" y="86"
    font-family="'Arial Black', Arial, sans-serif"
