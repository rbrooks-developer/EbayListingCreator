name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_TOKEN_WORKER_URL: ${{ secrets.VITE_TOKEN_WORKER_URL }}
          VITE_EBAY_CLIENT_ID: ${{ secrets.VITE_EBAY_CLIENT_ID }}
          VITE_EBAY_RUNAME: ${{ secrets.VITE_EBAY_RUNAME }}
          VITE_EBAY_SANDBOX_CLIENT_ID: ${{ secrets.VITE_EBAY_SANDBOX_CLIENT_ID }}
          VITE_EBAY_SANDBOX_RUNAME: ${{ secrets.VITE_EBAY_SANDBOX_RUNAME }}
          VITE_STRIPE_PRO_PRICE_ID: ${{ secrets.VITE_STRIPE_PRO_PRICE_ID }}
          VITE_STRIPE_BUSINESS_PRICE_ID: ${{ secrets.VITE_STRIPE_BUSINESS_PRICE_ID }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
